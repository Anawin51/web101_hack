<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ร้านอาหาร</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="r-han.png">
</head>
<body>
    <div class="auth-layout">
        <div id="alert-box" class="alert hidden"></div>

        <div id="register-box" class="card card-auth">
            <div class="auth-logo">
                <h1>📝 สมัครสมาชิก</h1>
                <p>เริ่มต้นจองโต๊ะกับเรา</p>
            </div>
            
            <form id="register-form">
                <div class="grid-2">
                    <div class="form-group">
                        <label>ชื่อ</label>
                        <input type="text" id="reg-firstname" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>นามสกุล</label>
                        <input type="text" id="reg-lastname" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>เบอร์โทรศัพท์</label>
                    <input type="tel" id="reg-phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>อีเมล</label>
                    <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="reg-password" class="form-control" required>
                </div>
                <button type="submit" id="btn-register" class="btn btn-success mt-2">ยืนยันการสมัคร</button>
            </form>
            
            <div class="divider">หรือ</div>
            
            <p class="text-center" style="font-size: 14px;">
                มีบัญชีอยู่แล้ว? <a href="login.html" class="font-bold">กลับไปเข้าสู่ระบบ</a>
            </p>
        </div>
    </div>

    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth-register.js"></script> </body>
</html>
