<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ร้านอาหาร</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="r-han.png">
</head>
<body>
    <div class="auth-layout">
        <div id="alert-box" class="alert hidden"></div>

        <div id="login-box" class="card card-auth">
            <div class="auth-logo">
                <h1>🍽️ Restaurant</h1>
                <p>ยินดีต้อนสู่ร้านอาหารอิ่มอร่อย</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label>อีเมล</label>
                    <input type="email" id="login-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" id="btn-login" class="btn btn-primary mt-2">เข้าสู่ระบบ</button>
            </form>
            
            <div class="divider">หรือ</div>
            
            <p class="text-center" style="font-size: 14px;">
                ยังไม่มีบัญชี? <a href="register.html" class="font-bold">สมัครสมาชิกที่นี่</a>
            </p>
        </div>
    </div>

    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth-login.js"></script> </body>
</html>
