<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการร้านอาหาร</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container flex-between">
            <h1>🍴 Restaurant Booking</h1>
            <div>
                <span id="nav-username" style="margin-right: 15px; font-weight: bold;">กำลังโหลด...</span>
                <button id="btn-logout" class="btn btn-danger btn-small">ออกระบบ</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="alert-box" class="alert hidden"></div>

        <div class="dashboard-grid">
            <div class="left-panel">
                <div class="card">
                    <h3>📅 จองโต๊ะ</h3>
                    <hr style="margin-bottom: 15px; border: 0; border-top: 1px solid #e5e7eb;">
                    <form id="book-form">
                        <div class="form-group">
                            <input type="date" id="book-date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <input type="time" id="book-time" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <input type="number" id="book-guests" min="1" placeholder="จำนวนลูกค้า" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success">ส่งคำขอจอง</button>
                    </form>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <h3>🪑 สถานะโต๊ะ</h3>
                    <hr style="margin-bottom: 15px; border: 0; border-top: 1px solid #e5e7eb;">
                    <div id="tables-loading" class="text-center">กำลังโหลด...</div>
                    <div id="tables-container" class="restaurant-tables"></div>
                </div>
            </div>

            <div class="card">
                <div class="flex-between">
                    <h3>📋 รายการจอง <span id="role-badge" style="font-size: 14px; font-weight: normal; color: #2563eb;"></span></h3>
                    <button onclick="fetchReservations()" class="btn btn-outline btn-small">🔄 รีเฟรช</button>
                </div>
                
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>วัน-เวลา</th>
                                <th>ลูกค้า</th>
                                <th class="text-center">คน</th>
                                <th class="text-center">โต๊ะ</th>
                                <th class="text-center">สถานะ</th>
                                <th id="th-action" class="text-center hidden">จัดการ (Admin)</th>
                            </tr>
                        </thead>
                        <tbody id="res-tbody">
                            <tr><td colspan="6" class="text-center">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
